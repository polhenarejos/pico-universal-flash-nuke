name: CMake

on:
  push:
  pull_request:
  release:
    types: [created]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

permissions:
  contents: write

jobs:
  build:
    permissions:
      contents: write
    name: ${{matrix.name}}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            cache-key: linux
            cmake-args: '-DPICO_SDK_PATH=$GITHUB_WORKSPACE/pico-sdk -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache'

    runs-on: ${{matrix.os}}

    env:
      PICO_SDK_PATH: $GITHUB_WORKSPACE/pico-sdk
      PIMORONI_PICO_LIBS: $GITHUB_WORKSPACE/pimoroni-pico
      RELEASE_FILE: ${{github.event.repository.name}}-${{github.event.release.tag_name}}
      SIGN_RP2350: ${{ github.event_name == 'release' && secrets.PRIVATE_KEY_B64 != '' }}

    steps:
    - name: Compiler Cache
      uses: actions/cache@v5
      with:
        path: /home/runner/.ccache
        key: ccache-cmake-${{github.ref}}-${{matrix.cache-key}}-${{github.sha}}
        restore-keys: |
          ccache-cmake-${{github.ref}}-${{matrix.cache-key}}
          ccache-cmake-${{github.ref}}
          ccache-cmake

    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        path: src

    # Checkout the Pico SDK
    - name: Checkout Pico SDK
      uses: actions/checkout@v6
      with:
        ref: '2.2.0'
        repository: raspberrypi/pico-sdk
        path: pico-sdk
        submodules: true

    - name: Install Arm GNU Toolchain (arm-none-eabi-gcc)
      uses: carlosperate/arm-none-eabi-gcc-action@v1
      with:
        release: '13.3.Rel1'

    - name: Install CCache
      run: sudo apt update && sudo apt install ccache

    - name: RP2350 - Create Build Environment
      run: cmake -E make_directory ${{runner.workspace}}/build-rp2350

    - name: RP2350 - Restore private key
      if: env.SIGN_RP2350 == 'true'
      run: |
        echo "${{ secrets.PRIVATE_KEY_B64 }}" | base64 -d > ${{runner.workspace}}/private.pem
        chmod 600 ${{runner.workspace}}/private.pem

    - name: RP2350 - Configure CMake
      shell: bash
      working-directory: ${{runner.workspace}}/build-rp2350
      run: >-
        cmake $GITHUB_WORKSPACE/src ${{matrix.cmake-args}} -DPICO_BOARD=pico2
        ${{ env.SIGN_RP2350 == 'true' && format('-DSECURE_BOOT_PKEY={0}/private.pem', runner.workspace) || '' }}

    - name: RP2350 - Build
      working-directory: ${{runner.workspace}}/build-rp2350
      shell: bash
      run: |
        ccache --zero-stats || true
        cmake --build . --config $BUILD_TYPE -j 2
        ccache --show-stats || true

    - name: RP2350 - Delete private key
      if: always() && env.SIGN_RP2350 == 'true'
      run: rm -f ${{runner.workspace}}/private.pem

    - name: RP2040 - Create Build Environment
      run: cmake -E make_directory ${{runner.workspace}}/build-rp2040

    - name: RP2040 - Configure CMake
      shell: bash
      working-directory: ${{runner.workspace}}/build-rp2040
      run: cmake $GITHUB_WORKSPACE/src ${{matrix.cmake-args}} -DPICO_BOARD=pico

    - name: RP2040 - Build
      working-directory: ${{runner.workspace}}/build-rp2040
      shell: bash
      run: |
        ccache --zero-stats || true
        cmake --build . --config $BUILD_TYPE -j 2
        ccache --show-stats || true

    - name: Combine Files
      working-directory: ${{runner.workspace}}
      run: |
        cat build-rp2040/flash_nuke.uf2 build-rp2350/flash_nuke.uf2 > universal_flash_nuke.uf2

    - name: Upload Artifact
      uses: actions/upload-artifact@v6
      with:
        name: universal_flash_nuke
        path: ${{runner.workspace}}/universal_flash_nuke.uf2

    - name: Upload Release .uf2
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
      with:
        files: ${{runner.workspace}}/universal_flash_nuke.uf2
